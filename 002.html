<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <link rel="shortcut icon" href="imagens/logo.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0"/>
    <style>
        body, html, #home{
            height: 100vh;
            position: relative;
        }

        body{
            background: url("imagens/capa.png") no-repeat fixed, url("imagens/ruido.png"), linear-gradient(50deg,#ff4169, #7c26f8);
            background-size: cover;
        }

        header{
            background-color: rgba(0, 0, 0, 0.6);
        }

        header li a, span{
            color: white;
            font-weight: bold;
        }

        #home div{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            text-align: center;
            width: 90%;
            color: white;
        }

        #home h1{
            font-weight: 500;
            letter-spacing: -0.05em;
        }

        .btn-roxo{
            background-color: #7c25f8;
        }

        .btn-m{
            margin: 40px 10px;
        }

        @media (max-width: 575.98px){
            #home h1{
                font-size: 3em; 
                padding-bottom: 30px;
            }

            .btn-m{
                margin: 15px 10px;
            }
        }

        @media (min-width: 576px) and (max-width: 767.98px){
            #home h1{
                font-size: 3em;
                padding-bottom: 30px;
            }

            .btn-m{
                margin: 15px 10px;
            }
        }

        @media (min-width: 768px) and (max-width: 991.98px){
            #home h1{
                font-size: 4em;
            }
        }

        @media (min-width: 992px) and (max-width: 1199.98px){
            #home h1{
                font-size: 5em;
            }
        }

        @media (min-width: 1200px){
            #home h1{
                font-size: 6em;
            }
        }
    </style>
    <title>Spotify</title>
</head>
<body>
    <header class="fixed-top">
        <nav class="navbar navbar-expand-md">
            <div class="container">
                <a href="#" class="navbar-brand"><img src="imagens/spotify.svg" alt="logo da empresa" width="142"></a>
                
                <button class="navbar-toggler" data-toggle="collapse" data-target="#nav-principal">
                    <i class="fa-solid fa-bars text-white"></i>
                </button>

                <div class="collapse navbar-collapse" id="nav-principal">
                    <ul class="navbar-nav ml-auto">
                        <li class="nav-item"><a href="" class="nav-link">Premium</a></li>
                        <li class="nav-item"><a href="" class="nav-link">Ajuda</a></li>
                        <li class="nav-item"><a href="" class="nav-link">Baixar</a></li>
                        <li class="nav-item"><span class="nav-link d-none d-md-block">|</span></li>
                        <li class="nav-item"><a href="" class="nav-link mr-4">Inscrever-se</a></li>
                        <li class="nav-item"><a href="" class="btn btn-light mt-3 mt-md-0">Entrar</a></li>
                    </ul>
                </div>
            </div>    
        </nav>
    </header>

    <section id="home">
        <div class="pb-3">
            <h1>Música para todos</h1>
            <a href="#" class="btn btn-lg btn-primary btn-roxo btn-m">APROVEITE O SPOTIFY FREE</a>
            <a href="#" class="btn btn-lg btn-outline-light btn-m">OBTER SPOTIFY PREMIUM</a>
        </div>
    </section>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.3/dist/umd/popper.min.js" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/js/bootstrap.min.js" integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy" crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/c61aa6b416.js" crossorigin="anonymous"></script>
</body>
</html>
